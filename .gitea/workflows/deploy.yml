name: Build and Deploy Mastrodocs

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: git.mmastro.dev/maxim/mastrodocs

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Gitea container registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | \
          docker login git.mmastro.dev \
            -u ${{ secrets.REGISTRY_USER }} \
            --password-stdin

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:latest \
                       -t ${{ env.IMAGE_NAME }}:${{ gitea.sha }} .
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ gitea.sha }}

      - name: Deploy container
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh -o StrictHostKeyChecking=no gitea-runner@172.17.0.1 \
            "docker pull git.mmastro.dev/maxim/mastrodocs:latest"
          ssh -o StrictHostKeyChecking=no gitea-runner@172.17.0.1 \
            "docker stop mastrodocs || true"
          ssh -o StrictHostKeyChecking=no gitea-runner@172.17.0.1 \
            "docker rm mastrodocs || true"
          ssh -o StrictHostKeyChecking=no gitea-runner@172.17.0.1 \
            "docker run -d --name mastrodocs --network homenet --restart unless-stopped -p 127.0.0.1:1240:3000 git.mmastro.dev/maxim/mastrodocs:latest"

      - name: Cleanup old images
        run: docker image prune -f
